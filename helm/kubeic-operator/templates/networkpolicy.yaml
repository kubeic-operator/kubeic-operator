{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeic-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeic-operator.operatorLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubeic-operator.operatorSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape metrics
    - ports:
        - port: 9090
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Kubernetes API (443 for ClusterIP, 6443 for direct/post-DNAT with Cilium)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
{{- end }}
