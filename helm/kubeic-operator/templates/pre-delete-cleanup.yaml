apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubeic-operator.fullname" . }}-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeic-operator.operatorLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "kubeic-operator.operatorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubeic-operator.fullname" . }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: {{ include "kubeic-operator.operatorImage" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command: ["python", "-m", "kubeic_operator.cleanup"]
          env:
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: OPERATOR_NAMESPACE
              value: {{ .Release.Namespace | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
