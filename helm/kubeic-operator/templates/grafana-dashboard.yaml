{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeic-operator.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeic-operator.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  image-audit-dashboard.json: |-
    {{- $dashboard := .Files.Get "dashboards/image-audit-dashboard.json" }}
    {{- $operatorJob := include "kubeic-operator.fullname" . }}
    {{- $checkerJob := .Values.checker.serviceName }}
    {{- $dashboard = replace "__KUBEIC_OPERATOR_JOB__" $operatorJob $dashboard }}
    {{- $dashboard = replace "__KUBEIC_CHECKER_JOB__" $checkerJob $dashboard }}
    {{- $dashboard | nindent 4 }}
{{- end }}
