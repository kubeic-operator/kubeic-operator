apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeic-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeic-operator.operatorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "kubeic-operator.operatorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeic-operator.operatorLabels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubeic-operator.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: {{ include "kubeic-operator.operatorImage" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            - name: OPERATOR_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CHECKER_IMAGE
              value: {{ include "kubeic-operator.checkerImage" . | quote }}
            - name: CHECKER_SERVICE
              value: {{ .Values.checker.serviceName | quote }}
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: CHECKER_VERSION
              value: {{ .Values.checker.image.tag | quote }}
            - name: CHECKER_CPU_REQUEST
              value: {{ .Values.checker.resources.requests.cpu | quote }}
            - name: CHECKER_MEMORY_REQUEST
              value: {{ .Values.checker.resources.requests.memory | quote }}
            - name: CHECKER_CPU_LIMIT
              value: {{ .Values.checker.resources.limits.cpu | quote }}
            - name: CHECKER_MEMORY_LIMIT
              value: {{ .Values.checker.resources.limits.memory | quote }}
            - name: EXCLUDED_NAMESPACES
              value: {{ .Values.checker.excludedNamespaces | join "," | quote }}
            - name: NO_SECRET_NAMESPACES
              value: {{ .Values.checker.noSecretNamespaces | join "," | quote }}
            - name: NAMESPACE_SECRETS
              value: {{ .Values.checker.namespaceSecrets | toJson | quote }}
            - name: CHECKER_POD_LABELS
              value: {{ .Values.checker.podLabels | toJson | quote }}
            - name: CHECKER_POD_ANNOTATIONS
              value: {{ .Values.checker.podAnnotations | toJson | quote }}
            - name: SKIP_ANNOTATION
              value: {{ .Values.policy.skipAnnotation | default "" | quote }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
