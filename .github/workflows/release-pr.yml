name: Create release PR

on:
  workflow_dispatch:
    branches: [alpha]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Create release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" origin/alpha
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release alpha into main" \
            --body "Automated PR to merge alpha changes into main for release."
